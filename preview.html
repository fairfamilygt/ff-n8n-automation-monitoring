<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TV Dashboard</title>
  <style>
    html, body { margin:0; height:100%; background:#000; }
    .grid{
      height:100%;
      display:grid;
      grid-template-columns:1fr 1fr;
      grid-template-rows:1fr 1fr;
      gap:6px;
      padding:6px;
      box-sizing:border-box;
    }
    iframe{ width:100%; height:100%; border:0; background:#fff; }
  </style>
</head>
<body>
  <div class="grid">
    <iframe src="https://lookerstudio.google.com/embed/reporting/9c1f248b-cb6a-4c6c-8a1b-84162a882970/page/OkpqF"></iframe>

    <iframe src="https://lookerstudio.google.com/embed/reporting/9c1f248b-cb6a-4c6c-8a1b-84162a882970/page/p_4yslklbg1d"></iframe>
    <iframe src="https://lookerstudio.google.com/embed/reporting/9c1f248b-cb6a-4c6c-8a1b-84162a882970/page/p_go5xg0fg1d"></iframe>
  </div>
</body>
</html>
