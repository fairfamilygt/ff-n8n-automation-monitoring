<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Automation Monitoring</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }

    iframe {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
      pointer-events: none;
    }
    iframe.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* Ladescreen */
    #loader {
      position: fixed;
      inset: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: #fff;
      font-family: sans-serif;
      gap: 20px;
    }
    #loader-text { font-size: 16px; opacity: 0.6; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #4CAF50;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #progress-bar {
      position: fixed;
      bottom: 0; left: 0;
      height: 4px;
      width: 0%;
      background: #4CAF50;
      z-index: 998;
      transition: width linear;
    }
    #indicator {
      position: fixed;
      bottom: 10px;
      left: 16px;
      color: rgba(255,255,255,0.4);
      font-family: sans-serif;
      font-size: 13px;
      z-index: 998;
    }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
    <div id="loader-text">Dashboards werden geladen… 0 / 4</div>
  </div>

  <iframe id="f0" src="https://lookerstudio.google.com/embed/reporting/9c1f248b-cb6a-4c6c-8a1b-84162a882970/page/OkpqF"></iframe>
  <iframe id="f1" src="https://lookerstudio.google.com/embed/reporting/9c1f248b-cb6a-4c6c-8a1b-84162a882970/page/p_ha8vla7f1d"></iframe>
  <iframe id="f2" src="https://lookerstudio.google.com/embed/reporting/9c1f248b-cb6a-4c6c-8a1b-84162a882970/page/p_4yslklbg1d"></iframe>
  <iframe id="f3" src="https://lookerstudio.google.com/embed/reporting/9c1f248b-cb6a-4c6c-8a1b-84162a882970/page/p_go5xg0fg1d"></iframe>

  <div id="progress-bar"></div>
  <div id="indicator">1 / 4</div>

  <script>
    const INTERVAL = 45; // Sekunden pro Seite
    const WAIT_FOR_ALL = true; // true = wartet bis alle 4 geladen sind

    const frames = Array.from(document.querySelectorAll("iframe"));
    const bar = document.getElementById("progress-bar");
    const indicator = document.getElementById("indicator");
    const loader = document.getElementById("loader");
    const loaderText = document.getElementById("loader-text");

    let current = 0;
    let loadedCount = 0;
    let started = false;

    function startRotation() {
      if (started) return;
      started = true;
      loader.style.display = "none";
      showSlide(0);
      setInterval(() => {
        current = (current + 1) % frames.length;
        showSlide(current);
      }, INTERVAL * 1000);
    }

    function showSlide(i) {
      frames.forEach(f => f.classList.remove("active"));
      frames[i].classList.add("active");
      indicator.textContent = (i + 1) + " / " + frames.length;
      bar.style.transition = "none";
      bar.style.width = "0%";
      requestAnimationFrame(() => requestAnimationFrame(() => {
        bar.style.transition = `width ${INTERVAL}s linear`;
        bar.style.width = "100%";
      }));
    }

    // Warte bis alle iFrames geladen sind
    frames.forEach(f => {
      f.addEventListener("load", () => {
        loadedCount++;
        loaderText.textContent = `Dashboards werden geladen… ${loadedCount} / ${frames.length}`;
        if (!WAIT_FOR_ALL && loadedCount === 1) startRotation();
        if (loadedCount === frames.length) startRotation();
      });
    });

    // Fallback nach 20 Sekunden – startet auch wenn nicht alle laden
    setTimeout(() => { if (!started) startRotation(); }, 20000);
  </script>
</body>
</html>
